services:
  db:
    image: postgres:18.4-bookworm
    container_name: postgres_container
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-mydb}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - net

  backend:
    build:
      context: .
      dockerfile: soundlink/Dockerfile
    container_name: backend
    command: python soundlink/manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: soundlink.settings
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - net
    restart: unless-stopped

  frontend:
    build:
      context: ../SoundLinkFront
    container_name: frontend
    volumes:
      - ../SoundLinkFront:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - net
    restart: unless-stopped

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp:db:5432
    ports:
      - "127.0.0.1:5432:5432"
    depends_on:
      - db
    networks:
      - net

networks:
  net:
    driver: bridge