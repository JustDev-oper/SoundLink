services:
  db:
    image: postgres:18.4-bookworm
    container_name: postgres_container
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-mydb}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - drf-net

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: todoapp-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp:todoapp-env-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"

  backend:
    build: .
    container_name: drf_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: myproject.settings
      DB_HOST: db
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_NAME: ${DB_NAME:-mydb}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - drf-net
    restart: unless-stopped

volumes:
  pgdata:

networks:
  drf-net:
    driver: bridge